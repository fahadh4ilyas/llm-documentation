<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    // Redirect 404 to root with path as hash
    // /llm-documentation/pendahuluan → /llm-documentation/#/pendahuluan
    var segments = window.location.pathname.split('/').filter(function(s) { return s !== ''; });
    var base = '/' + segments[0];
    var rest = segments.slice(1).join('/');
    window.location.replace(
      window.location.protocol + '//' + window.location.host +
      base + '/#/' + rest +
      window.location.search +
      window.location.hash
    );
  </script>
</head>
<body></body>
</html>
